{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — NovelShelf</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'books/css/style.css' %}">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="text-center mb-4">
            <div class="auth-logo">NovelShelf</div>
            <p class="text-muted small mt-1">Koleksi novel pribadi kamu</p>
        </div>

        <h2 class="h5 fw-bold mb-1">Login</h2>
        <p class="text-muted small mb-4">Masuk untuk lihat koleksimu</p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold small">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Masukkan username" autofocus required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold small">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
            </div>

            {% if form.non_field_errors %}
            <div class="alert alert-danger small py-2">Username atau password salah.</div>
            {% endif %}

            <button type="submit" class="btn btn-primary w-100 mt-1">Login</button>
        </form>

        <hr class="my-3">
        <p class="text-center text-muted small mb-0">
            Belum punya akun?
            <a href="{% url 'register' %}" class="text-decoration-none fw-semibold" style="color: #7B4F2E;">Daftar di sini</a>
        </p>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
