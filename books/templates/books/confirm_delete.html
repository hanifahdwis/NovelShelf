{% extends 'books/base.html' %}
{% block title %}Hapus Novel — NovelShelf{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-sm-6 col-md-4">
        <div class="bg-white border rounded-3 p-4 text-center" style="border-color: #E2D9CC !important;">

            <p class="fw-semibold mb-4">Yakin ingin menghapus novel ini?</p>

            <form method="POST" class="d-flex justify-content-center gap-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger px-4">Ya, Hapus</button>
                <a href="{% url 'book_detail' book.pk %}" class="btn btn-outline-secondary px-4">Batal</a>
            </form>

        </div>
    </div>
</div>
{% endblock %}
