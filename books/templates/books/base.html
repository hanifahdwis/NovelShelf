{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NovelShelf{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'books/css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-sm px-3">
    <div class="container-lg">
        <a class="navbar-brand" href="{% url 'dashboard' %}">ReadMark</a>
        {% if user.is_authenticated %}
        <div class="d-flex align-items-center gap-3 ms-auto">
            <span class="text-white">{{ user.username }}</span>
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
        {% endif %}
    </div>
</nav>

<div class="container-lg py-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
